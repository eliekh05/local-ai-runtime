<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>local-ai-runtime</title>
<style>
:root{--bg:#0d1117;--surface:#161b22;--border:#30363d;--text:#e6edf3;--muted:#8b949e;--user:#1f3a5f;--ai:#1a2e1a;--accent:#58a6ff;--error:#f85149;--mono:"SF Mono","Fira Code",Menlo,Consolas,monospace;--sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}html,body{height:100%;font-size:16px;line-height:1.5;font-family:var(--sans);background:var(--bg);color:var(--text)}
@media(prefers-reduced-motion:reduce){*{animation-duration:.01ms!important;transition-duration:.01ms!important}}
.page{display:flex;flex-direction:column;height:100vh}
.header{display:flex;align-items:center;justify-content:space-between;padding:.75rem 1rem;border-bottom:1px solid var(--border);background:var(--surface);gap:.5rem;flex-wrap:wrap}
.title{font-weight:600;font-size:1rem}.status{font-size:.75rem;color:var(--muted);display:flex;align-items:center;gap:.35rem}
.dot{width:8px;height:8px;border-radius:50%;display:inline-block}.dot-ok{background:#3fb950}.dot-err{background:var(--error)}
.selects{display:flex;gap:.5rem;align-items:center}select{font-size:.8rem;padding:.25rem .5rem;border-radius:4px;background:var(--bg);color:var(--text);border:1px solid var(--border)}
.chat{flex:1;overflow-y:auto;padding:1rem;display:flex;flex-direction:column;gap:.75rem}
.chat-empty{display:flex;align-items:center;justify-content:center;color:var(--muted);font-style:italic}
.msg{padding:.75rem 1rem;border-radius:8px;max-width:80%;word-wrap:break-word}.msg-user{background:var(--user);margin-left:auto}.msg-assistant{background:var(--ai);margin-right:auto}
.msg-role{display:block;font-size:.7rem;color:var(--muted);text-transform:uppercase;margin-bottom:.25rem}.msg-content p{margin:0}
.msg-content pre{background:#0d1117;padding:.75rem;border-radius:4px;overflow-x:auto;font-family:var(--mono);font-size:.875rem;margin:.5rem 0}
.msg-content code{font-family:var(--mono);font-size:.875rem}.msg-content :not(pre)>code{background:rgba(110,118,129,.2);padding:.15rem .3rem;border-radius:3px}
.msg-ts{display:block;font-size:.65rem;color:var(--muted);margin-top:.25rem}.typing{color:var(--muted);letter-spacing:.2em;font-size:.9rem;padding:.5rem 1rem}
.input-bar{display:flex;gap:.5rem;padding:.75rem 1rem;border-top:1px solid var(--border);background:var(--surface)}
.input-bar textarea{flex:1;resize:none;padding:.5rem;border-radius:6px;border:1px solid var(--border);font-family:var(--sans);font-size:1rem;background:var(--bg);color:var(--text)}
.input-bar textarea:focus{outline:none;border-color:var(--accent)}.input-bar textarea:disabled{opacity:.5}
.send{padding:.5rem 1.25rem;border-radius:6px;border:none;background:var(--accent);color:#fff;cursor:pointer;font-weight:500}.send:hover{opacity:.9}.send:disabled{cursor:not-allowed;opacity:.4}
.error{background:rgba(248,81,73,.15);border:1px solid var(--error);border-radius:6px;padding:.5rem 1rem;display:flex;align-items:center;gap:.75rem;color:var(--error);font-size:.875rem}
.error button{background:var(--error);color:#fff;border:none;padding:.25rem .75rem;border-radius:4px;cursor:pointer}
.setup{max-width:560px;margin:auto;padding:2rem;width:100%}.setup h2{margin-bottom:.35rem;text-align:center;color:var(--accent);font-size:1.3rem}
.setup .sub{text-align:center;color:var(--muted);font-size:.85rem;margin-bottom:1.25rem}
.provider-grid{display:flex;flex-direction:column;gap:.5rem;margin-bottom:1rem;max-height:42vh;overflow:auto;padding-right:.25rem}
.provider-btn{padding:.75rem 1rem;border-radius:8px;border:1px solid var(--border);background:var(--surface);color:var(--text);cursor:pointer;text-align:left;font-size:.9rem;display:flex;justify-content:space-between;align-items:center;gap:.75rem}
.provider-btn:hover{border-color:var(--accent)}.provider-btn.selected{border-color:var(--accent);background:rgba(88,166,255,.1)}
.provider-btn .name{font-weight:600}.provider-btn .desc{font-size:.75rem;color:var(--muted)}
.provider-btn .badge{font-size:.65rem;padding:.15rem .4rem;border-radius:3px;background:var(--border);color:var(--muted);white-space:nowrap}
.key-form{margin-top:.25rem;display:none}.key-form.active{display:block}
.key-form label{display:block;font-size:.8rem;color:var(--muted);margin-bottom:.25rem}
.key-form input,.key-form select{width:100%;padding:.5rem;border-radius:6px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:.9rem;margin-bottom:.75rem}
.key-form input:focus,.key-form select:focus{outline:none;border-color:var(--accent)}
.start-btn{width:100%;padding:.6rem;border-radius:6px;border:none;background:var(--accent);color:#fff;cursor:pointer;font-weight:600;font-size:1rem;margin-top:.5rem}
.start-btn:hover{opacity:.9}.start-btn:disabled{opacity:.4;cursor:not-allowed}
.hint{font-size:.75rem;color:var(--muted);margin-top:.5rem}
.setup-error{color:var(--error);font-size:.85rem;margin-top:.75rem}
.linkish{background:none;border:none;color:var(--accent);cursor:pointer;font-size:.75rem;padding:0}
@media(max-width:640px){.msg{max-width:95%}.header{padding:.5rem}.input-bar{padding:.5rem}}
</style>
</head>
<body>
<div class="page" id="app"></div>
<script type="module">
const API="";
const $=(t,p={},...c)=>{const e=document.createElement(t);Object.entries(p).forEach(([k,v])=>{if(k==="on")Object.entries(v).forEach(([ev,fn])=>e.addEventListener(ev,fn));else if(k==="class")e.className=v;else if(k==="html")e.innerHTML=v;else if(k==="style"&&typeof v==="object")Object.assign(e.style,v);else if(k==="style")e.setAttribute("style",v);else e.setAttribute(k,v)});c.flat().forEach(x=>{if(x==null)return;e.appendChild(typeof x==="string"?document.createTextNode(x):x)});return e};
function md(t){if(!t)return"";return t.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/```(\w*)\n([\s\S]*?)```/g,(_,l,c)=>`<pre><code>${c.trim()}</code></pre>`).replace(/`([^`]+)`/g,"<code>$1</code>").replace(/\*\*(.+?)\*\*/g,"<strong>$1</strong>").replace(/\*(.+?)\*/g,"<em>$1</em>").replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2" target="_blank" style="color:var(--accent)">$1</a>').replace(/\n/g,"<br>")}

let PROVIDERS=[];
let messages=[],conversationId=null,loading=false,error=null,needsSetup=true,activeConfig=null;
const app=document.getElementById("app");

async function loadProviders(){
  try{
    const r=await fetch(`${API}/config/providers`);
    if(r.ok){const d=await r.json();PROVIDERS=d.providers||[];return}
  }catch{}
  PROVIDERS=[
    {id:"ollama",name:"Ollama",desc:"Local models",kind:"local",needs_key:false,needs_url:false,needs_model:true,models:["llama3.2"]},
    {id:"openai",name:"OpenAI",desc:"GPT models",kind:"api",needs_key:true,needs_url:false,needs_model:true,models:["gpt-4o-mini"],placeholder:"sk-..."},
    {id:"custom",name:"Custom OpenAI-compatible",desc:"Any /v1 endpoint",kind:"api",needs_key:false,needs_url:true,needs_model:false,models:[]},
  ];
}

async function checkSetup(){
  const forceSetup=new URLSearchParams(location.search).has("setup");
  if(forceSetup){needsSetup=true;return}
  try{
    const r=await fetch(`${API}/config/`);
    if(!r.ok){needsSetup=true;return}
    const c=await r.json();
    activeConfig=c;
    // Show wizard until the user completes Start (onboarding_done)
    needsSetup=c.show_onboarding===true||c.onboarding_done===false||(c.ready!==true&&c.show_onboarding!==false);
    if(c.onboarding_done===true&&c.ready===true)needsSetup=false;
  }catch{needsSetup=true}
}

function showForm(id){
  document.querySelectorAll(".key-form").forEach(f=>f.classList.remove("active"));
  const form=document.getElementById(`form-${id}`);
  if(form)form.classList.add("active");
}

function render(){
  app.innerHTML="";
  if(needsSetup){renderSetup();return}
  renderChat();
}

function renderSetup(){
  app.innerHTML="";
  const s=$("div",{class:"setup"},
    $("h2",{},">> local-ai-runtime"),
    $("div",{class:"sub"},"BYOK hybrid runtime — pick a local engine, cloud key, or router"),
  );
  const grid=$("div",{class:"provider-grid"});
  let selected=null;
  const err=$("div",{class:"setup-error",id:"setup-error"});
  const formHost=$("div",{id:"form-host"});

  PROVIDERS.forEach(p=>{
    const btn=$("div",{class:"provider-btn",on:{click:()=>{
      grid.querySelectorAll(".provider-btn").forEach(b=>b.classList.remove("selected"));
      btn.classList.add("selected");selected=p;showForm(p.id);err.textContent="";
    }}},
      $("div",{},$("div",{class:"name"},p.name),$("div",{class:"desc"},p.desc)),
      $("span",{class:"badge"},p.kind||"api"),
    );
    grid.appendChild(btn);

    const form=$("div",{class:"key-form",id:`form-${p.id}`});
    if(p.needs_url){
      form.appendChild($("label",{},"Base URL"));
      form.appendChild($("input",{type:"url",id:`url-${p.id}`,placeholder:p.base_url||"http://127.0.0.1:1234/v1",value:p.base_url||""}));
    }
    if(p.needs_key||p.kind==="api"||p.kind==="router"){
      if(p.needs_key||p.placeholder){
        form.appendChild($("label",{},`${p.name} API Key${p.needs_key?"":" (optional)"}`));
        form.appendChild($("input",{type:"password",id:`key-${p.id}`,placeholder:p.placeholder||"API key"}));
      }
    }
    if((p.models&&p.models.length)||p.needs_model){
      form.appendChild($("label",{},"Model"));
      if(p.models&&p.models.length){
        const sel=$("select",{id:`model-sel-${p.id}`});
        p.models.forEach(m=>sel.appendChild($("option",{value:m},m)));
        if(p.default_model)sel.value=p.default_model;
        form.appendChild(sel);
      }else{
        form.appendChild($("input",{type:"text",id:`model-${p.id}`,placeholder:p.default_model||"model name",value:p.default_model||""}));
      }
    }
    if(p.id==="llama-cpp"){
      form.appendChild($("div",{class:"hint"},"Drop a .gguf file into the models/ directory first."));
    }
    if(p.id==="nine_router"){
      form.appendChild($("div",{class:"hint"},"Default: http://127.0.0.1:20128/api/v1 — leave key blank for local access."));
    }
    if(p.id==="lmstudio"){
      form.appendChild($("div",{class:"hint"},"Start LM Studio local server on port 1234."));
    }
    formHost.appendChild(form);
  });

  s.appendChild(grid);
  s.appendChild(formHost);

  const btn=$("button",{class:"start-btn",on:{click:async()=>{
    if(!selected){err.textContent="Select a provider first.";return}
    err.textContent="";
    const key=document.getElementById(`key-${selected.id}`)?.value?.trim()||"";
    const url=document.getElementById(`url-${selected.id}`)?.value?.trim()||selected.base_url||"";
    const modelSel=document.getElementById(`model-sel-${selected.id}`);
    const modelInput=document.getElementById(`model-${selected.id}`);
    const model=(modelSel?.value||modelInput?.value||selected.default_model||"").trim();

    if(selected.needs_key&&!key){err.textContent=`Enter your ${selected.name} API key.`;return}
    if(selected.needs_url&&!url){err.textContent="Enter a base URL.";return}
    if(selected.id==="llama-cpp"&&!model){err.textContent="Enter a GGUF filename from models/.";return}
    if(selected.id==="ollama"&&!model){err.textContent="Enter an Ollama model name.";return}

    const apikeyBody={provider:selected.id,api_key:key,base_url:url||null,model:model||null};
    const keyRes=await fetch(`${API}/config/apikey`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(apikeyBody)});
    if(!keyRes.ok){
      const detail=await keyRes.json().catch(()=>({}));
      err.textContent=detail.detail||`Provider setup failed (${keyRes.status})`;
      return;
    }

    // Ensure llama-cpp / explicit model_file persisted via PUT when needed
    const putBody={provider_id:selected.id,backend_type:selected.backend,onboarding_done:true};
    if(model)putBody.model_file=model;
    if(selected.backend==="openai_compatible"&&url)putBody.compatible_base_url=url;
    if(selected.backend==="openai_compatible"&&model)putBody.compatible_model=model;
    if(selected.backend==="openai"&&model)putBody.openai_model=model;
    if(selected.backend==="anthropic"&&model)putBody.anthropic_model=model;
    if(selected.backend==="gemini"&&model)putBody.gemini_model=model;
    if(selected.backend==="ollama"&&model)putBody.ollama_model=model;
    if(selected.backend==="vllm"&&model)putBody.vllm_model=model;

    const res=await fetch(`${API}/config/`,{method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify(putBody)});
    if(!res.ok){
      const detail=await res.json().catch(()=>({}));
      err.textContent=detail.detail||`Config update failed (${res.status})`;
      return;
    }
    needsSetup=false;render();
  }}},">> Start");
  s.appendChild(btn);
  s.appendChild(err);
  s.appendChild($("div",{class:"hint"},"After start, other apps can use OpenAI SDKs against http://localhost:8000/v1"));
  app.appendChild(s);
}

function renderChat(){
  const h=$("div",{class:"header"},
    $("span",{class:"title"},"local-ai-runtime"),
    $("div",{class:"selects",id:"controls"}),
    $("div",{class:"status",id:"status"}),
  );
  app.appendChild(h);

  fetch(`${API}/status/`).then(r=>r.json()).then(s=>{
    document.getElementById("status").innerHTML=`<span class="dot ${s.status==="ok"?"dot-ok":"dot-err"}"></span> v${s.version||"?"}${s.model_loaded&&s.current_model?" · "+s.current_model:""}`;
  }).catch(()=>{document.getElementById("status").innerHTML=`<span class="dot dot-err"></span> unreachable`});

  fetch(`${API}/config/`).then(r=>r.json()).then(c=>{
    activeConfig=c;
    const label=$("span",{style:"font-size:.75rem;color:var(--muted)"},`${c.provider_id||c.backend_type||"?"}${c.model_file?" · "+c.model_file:""}`);
    const change=$("button",{class:"linkish",on:{click:async()=>{
      await fetch(`${API}/config/`,{method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify({onboarding_done:false})});
      needsSetup=true;history.replaceState({},"","/?setup=1");render();
    }}},"change provider");
    const controls=document.getElementById("controls");
    controls.appendChild(label);
    controls.appendChild(change);
  }).catch(()=>{});

  fetch(`${API}/models/`).then(r=>r.json()).then(d=>{
    if(!d.models||!d.models.length)return;
    const sel=$("select",{on:{change:e=>{fetch(`${API}/config/`,{method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify({model_file:e.target.value})})}}});
    d.models.forEach(m=>sel.appendChild($("option",{value:m.filename},m.filename)));
    document.getElementById("controls").appendChild(sel);
  }).catch(()=>{});

  const chat=$("div",{class:"chat",id:"chat"});
  if(!messages.length&&!loading)chat.appendChild($("div",{class:"chat-empty"},"Type a message to start."));
  else{messages.forEach(m=>{
    const cls=m.role==="user"?"msg-user":"msg-assistant";
    const b=$("div",{class:`msg ${cls}`});b.appendChild($("span",{class:"msg-role"},m.role));
    const c=$("div",{class:"msg-content"});if(m.role==="assistant")c.innerHTML=md(m.content);else c.appendChild($("p",{},m.content));
    b.appendChild(c);if(m.ts)b.appendChild($("span",{class:"msg-ts"},m.ts));chat.appendChild(b)
  });if(loading)chat.appendChild($("div",{class:"typing"},"···"))}
  app.appendChild(chat);
  if(error)app.appendChild($("div",{class:"error"},$("span",{},error),$("button",{on:{click:retryLast}},"Retry")));
  const inp=$("textarea",{id:"input",placeholder:loading?"Waiting...":"Type a message...",rows:"1",on:{keydown:e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();send()}}}});
  if(loading)inp.disabled=true;
  const btn=$("button",{class:"send"},"Send");if(loading)btn.disabled=true;btn.onclick=send;
  app.appendChild($("div",{class:"input-bar"},inp,btn));
  chat.scrollTop=chat.scrollHeight;if(!loading)inp.focus();
}

async function send(){
  const inp=document.getElementById("input");const text=inp?.value?.trim();if(!text||loading)return;
  messages.push({role:"user",content:text,ts:new Date().toLocaleTimeString()});loading=true;error=null;inp.value="";render();
  try{const res=await fetch(`${API}/chat/stream/`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({message:text,conversation_id:conversationId})});
  if(!res.ok){const err=await res.json().catch(()=>({detail:"Request failed"}));throw new Error(typeof err.detail==="string"?err.detail:`HTTP ${res.status}`)}
  const reader=res.body.getReader(),dec=new TextDecoder();let full="";messages.push({role:"assistant",content:"",ts:""});
  while(true){const{done,value}=await reader.read();if(done)break;for(const line of dec.decode(value,{stream:true}).split("\n")){if(!line.startsWith("data: "))continue;try{const d=JSON.parse(line.slice(6));if(d.done)break;if(d.token){full+=d.token;messages[messages.length-1].content=full;render()}if(d.error){error=d.error;break}}catch{}}}}
  catch(e){error=e.message;messages=messages.filter(m=>!(m.role==="assistant"&&!m.content))}finally{loading=false;render()}
}

function retryLast(){const last=[...messages].reverse().find(m=>m.role==="user");if(last){messages=messages.filter(m=>m!==last);const t=last.content;messages.push({role:"user",content:t,ts:new Date().toLocaleTimeString()});loading=true;error=null;render();
fetch(`${API}/chat/stream/`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({message:t,conversation_id:conversationId})}).then(async res=>{
const r=res.body.getReader(),d=new TextDecoder();let f="";messages.push({role:"assistant",content:"",ts:""});
while(true){const{done,value}=await r.read();if(done)break;for(const line of d.decode(value,{stream:true}).split("\n")){if(!line.startsWith("data: "))continue;try{const x=JSON.parse(line.slice(6));if(x.token){f+=x.token;messages[messages.length-1].content=f;render()}if(x.error){error=x.error;break}}catch{}}}
}).catch(e=>{error=e.message}).finally(()=>{loading=false;render()})}}

fetch(`${API}/conversations/`,{method:"POST",headers:{"Content-Type":"application/json"},body:"{}"}).then(r=>r.json()).then(c=>conversationId=c.id).catch(()=>{});
Promise.all([loadProviders(),checkSetup()]).then(()=>render());
</script>
</body>
</html>
