<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>local-ai-runtime</title>
<style>
:root {
  --bg: #0d1117;
  --surface: #161b22;
  --border: #30363d;
  --text: #e6edf3;
  --muted: #8b949e;
  --user-bubble: #1f3a5f;
  --ai-bubble: #1a2e1a;
  --accent: #58a6ff;
  --error: #f85149;
  --mono: "SF Mono","Fira Code",Menlo,Consolas,monospace;
  --sans: -apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-size:16px;line-height:1.5;font-family:var(--sans);background:var(--bg);color:var(--text)}
@media(prefers-reduced-motion:reduce){*{animation-duration:.01ms!important;transition-duration:.01ms!important}}
.page{display:flex;flex-direction:column;height:100vh}
.header{display:flex;align-items:center;justify-content:space-between;padding:.75rem 1rem;border-bottom:1px solid var(--border);background:var(--surface);gap:.5rem;flex-wrap:wrap}
.title{font-weight:600;font-size:1rem}
.status{font-size:.75rem;color:var(--muted);display:flex;align-items:center;gap:.35rem}
.dot{width:8px;height:8px;border-radius:50%;display:inline-block}
.dot-ok{background:#3fb950}
.dot-err{background:var(--error)}
.dot-unk{background:var(--muted)}
.chat{flex:1;overflow-y:auto;padding:1rem;display:flex;flex-direction:column;gap:.75rem}
.chat-empty{display:flex;align-items:center;justify-content:center;color:var(--muted);font-style:italic}
.msg{padding:.75rem 1rem;border-radius:8px;max-width:80%;word-wrap:break-word}
.msg-user{background:var(--user-bubble);margin-left:auto}
.msg-assistant{background:var(--ai-bubble);margin-right:auto}
.msg-role{display:block;font-size:.7rem;color:var(--muted);text-transform:uppercase;margin-bottom:.25rem}
.msg-content p{margin:0}
.msg-content pre{background:#0d1117;padding:.75rem;border-radius:4px;overflow-x:auto;font-family:var(--mono);font-size:.875rem;margin:.5rem 0}
.msg-content code{font-family:var(--mono);font-size:.875rem}
.msg-content :not(pre)>code{background:rgba(110,118,129,.2);padding:.15rem .3rem;border-radius:3px}
.msg-ts{display:block;font-size:.65rem;color:var(--muted);margin-top:.25rem}
.typing{color:var(--muted);letter-spacing:.2em;font-size:.9rem;padding:.5rem 1rem}
.input-bar{display:flex;gap:.5rem;padding:.75rem 1rem;border-top:1px solid var(--border);background:var(--surface)}
.input-bar textarea{flex:1;resize:none;padding:.5rem;border-radius:6px;border:1px solid var(--border);font-family:var(--sans);font-size:1rem;background:var(--bg);color:var(--text)}
.input-bar textarea:focus{outline:none;border-color:var(--accent)}
.input-bar textarea:disabled{opacity:.5}
.send{padding:.5rem 1.25rem;border-radius:6px;border:none;background:var(--accent);color:#fff;cursor:pointer;font-weight:500;font-size:.9rem}
.send:hover{opacity:.9}
.send:disabled{cursor:not-allowed;opacity:.4}
.error{background:rgba(248,81,73,.15);border:1px solid var(--error);border-radius:6px;padding:.5rem 1rem;display:flex;align-items:center;gap:.75rem;color:var(--error);font-size:.875rem}
.error button{background:var(--error);color:#fff;border:none;padding:.25rem .75rem;border-radius:4px;cursor:pointer}
select.model{font-size:.8rem;padding:.25rem .5rem;border-radius:4px;background:var(--bg);color:var(--text);border:1px solid var(--border)}
@media(max-width:640px){.msg{max-width:95%}.header{padding:.5rem}.input-bar{padding:.5rem}}
</style>
</head>
<body>
<div class="page" id="app"></div>
<script type="module">
const API = "";

const $ = (tag, props = {}, ...children) => {
  const el = document.createElement(tag);
  Object.entries(props).forEach(([k, v]) => {
    if (k === "on") Object.entries(v).forEach(([ev, fn]) => el.addEventListener(ev, fn));
    else if (k === "class") el.className = v;
    else if (k === "html") el.innerHTML = v;
    else el.setAttribute(k, v);
  });
  children.flat().forEach(c => {
    if (c == null) return;
    el.appendChild(typeof c === "string" ? document.createTextNode(c) : c);
  });
  return el;
};

// Simple markdown: code blocks, inline code, bold, italic, links, line breaks
function md(text) {
  if (!text) return "";
  let h = text
    .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
    .replace(/```(\w*)\n([\s\S]*?)```/g, (_, lang, code) => `<pre><code>${code.trim()}</code></pre>`)
    .replace(/`([^`]+)`/g, "<code>$1</code>")
    .replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>")
    .replace(/\*(.+?)\*/g, "<em>$1</em>")
    .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" style="color:var(--accent)">$1</a>')
    .replace(/\n/g, "<br>");
  return h;
}

// State
let messages = [];
let conversationId = null;
let loading = false;
let error = null;
let currentModel = "";

const app = document.getElementById("app");

function render() {
  app.innerHTML = "";

  // Header
  const header = $("div", { class: "header" },
    $("span", { class: "title" }, "local-ai-runtime"),
    $("div", { class: "status", id: "status" }),
  );
  app.appendChild(header);

  // Fetch status
  fetch(`${API}/status/`).then(r=>r.json()).then(s => {
    const dot = s.status === "ok" ? "dot-ok" : "dot-err";
    document.getElementById("status").innerHTML =
      `<span class="dot ${dot}"></span> v${s.version||"?"}${s.model_loaded && s.current_model ? " · " + s.current_model : ""}`;
  }).catch(() => {
    document.getElementById("status").innerHTML = `<span class="dot dot-err"></span> unreachable`;
  });

  // Chat area
  const chat = $("div", { class: "chat", id: "chat" });
  if (messages.length === 0 && !loading) {
    chat.appendChild($("div", { class: "chat-empty" }, "Type a message to start."));
  } else {
    messages.forEach(msg => {
      const cls = msg.role === "user" ? "msg-user" : "msg-assistant";
      const bubble = $("div", { class: `msg ${cls}` });
      bubble.appendChild($("span", { class: "msg-role" }, msg.role));
      const content = $("div", { class: "msg-content" });
      if (msg.role === "assistant") {
        content.innerHTML = md(msg.content);
      } else {
        content.appendChild($("p", {}, msg.content));
      }
      bubble.appendChild(content);
      if (msg.ts) bubble.appendChild($("span", { class: "msg-ts" }, msg.ts));
      chat.appendChild(bubble);
    });
    if (loading) {
      chat.appendChild($("div", { class: "typing" }, "···"));
    }
  }
  app.appendChild(chat);

  // Error
  if (error) {
    const errBar = $("div", { class: "error" },
      $("span", {}, error),
      $("button", { on: { click: retryLast } }, "Retry"),
    );
    app.appendChild(errBar);
  }

  // Input
  const input = $("textarea", {
    id: "input",
    placeholder: loading ? "Waiting..." : "Type a message...",
    rows: "1",
    on: {
      keydown: e => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); } },
    },
  });
  if (loading) input.disabled = true;

  const sendBtn = $("button", { class: "send", id: "sendbtn" }, "Send");
  if (loading) sendBtn.disabled = true;
  sendBtn.onclick = send;

  const bar = $("div", { class: "input-bar" }, input, sendBtn);
  app.appendChild(bar);

  // Auto-scroll
  chat.scrollTop = chat.scrollHeight;

  // Focus input
  if (!loading) input.focus();
}

async function send() {
  const input = document.getElementById("input");
  const text = input?.value?.trim();
  if (!text || loading) return;

  messages.push({ role: "user", content: text, ts: new Date().toLocaleTimeString() });
  loading = true;
  error = null;
  input.value = "";
  render();

  try {
    const res = await fetch(`${API}/chat/stream/`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ message: text, conversation_id: conversationId }),
    });

    if (!res.ok) {
      const err = await res.json().catch(() => ({ detail: "Request failed" }));
      throw new Error(err.detail || `HTTP ${res.status}`);
    }

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let full = "";
    messages.push({ role: "assistant", content: "", ts: "" });

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      const chunk = decoder.decode(value, { stream: true });
      for (const line of chunk.split("\n")) {
        if (!line.startsWith("data: ")) continue;
        try {
          const data = JSON.parse(line.slice(6));
          if (data.done) break;
          if (data.token) {
            full += data.token;
            messages[messages.length - 1].content = full;
            render();
          }
          if (data.error) { error = data.error; break; }
        } catch {}
      }
    }
  } catch (e) {
    error = e.message;
    messages = messages.filter(m => !(m.role === "assistant" && !m.content));
  } finally {
    loading = false;
    render();
  }
}

function retryLast() {
  const lastUser = [...messages].reverse().find(m => m.role === "user");
  if (lastUser) {
    messages = messages.filter(m => m !== lastUser);
    const text = lastUser.content;
    render();
    // Manually trigger send with text
    messages.push({ role: "user", content: text, ts: new Date().toLocaleTimeString() });
    loading = true;
    error = null;
    render();

    fetch(`${API}/chat/stream/`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ message: text, conversation_id: conversationId }),
    }).then(async res => {
      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      let full = "";
      messages.push({ role: "assistant", content: "", ts: "" });
      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        const chunk = decoder.decode(value, { stream: true });
        for (const line of chunk.split("\n")) {
          if (!line.startsWith("data: ")) continue;
          try {
            const data = JSON.parse(line.slice(6));
            if (data.token) { full += data.token; messages[messages.length - 1].content = full; render(); }
            if (data.error) { error = data.error; break; }
          } catch {}
        }
      }
    }).catch(e => { error = e.message; }).finally(() => { loading = false; render(); });
  }
}

// Init: create conversation
fetch(`${API}/conversations/`, { method: "POST", headers: { "Content-Type": "application/json" }, body: "{}" })
  .then(r => r.json()).then(c => conversationId = c.id).catch(() => {});

render();
</script>
</body>
</html>
