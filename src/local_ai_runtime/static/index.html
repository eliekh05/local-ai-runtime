<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>local-ai-runtime</title>
<style>
:root{--bg:#0d1117;--surface:#161b22;--border:#30363d;--text:#e6edf3;--muted:#8b949e;--user:#1f3a5f;--ai:#1a2e1a;--accent:#58a6ff;--error:#f85149;--mono:"SF Mono","Fira Code",Menlo,Consolas,monospace;--sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-size:16px;line-height:1.5;font-family:var(--sans);background:var(--bg);color:var(--text)}
@media(prefers-reduced-motion:reduce){*{animation-duration:.01ms!important;transition-duration:.01ms!important}}
.page{display:flex;flex-direction:column;height:100vh}
.header{display:flex;align-items:center;justify-content:space-between;padding:.75rem 1rem;border-bottom:1px solid var(--border);background:var(--surface);gap:.5rem;flex-wrap:wrap}
.title{font-weight:600;font-size:1rem}
.status{font-size:.75rem;color:var(--muted);display:flex;align-items:center;gap:.35rem}
.dot{width:8px;height:8px;border-radius:50%;display:inline-block}
.dot-ok{background:#3fb950}.dot-err{background:var(--error)}.dot-unk{background:var(--muted)}
.selects{display:flex;gap:.5rem;align-items:center}
select{font-size:.8rem;padding:.25rem .5rem;border-radius:4px;background:var(--bg);color:var(--text);border:1px solid var(--border)}
.chat{flex:1;overflow-y:auto;padding:1rem;display:flex;flex-direction:column;gap:.75rem}
.chat-empty{display:flex;align-items:center;justify-content:center;color:var(--muted);font-style:italic}
.msg{padding:.75rem 1rem;border-radius:8px;max-width:80%;word-wrap:break-word}
.msg-user{background:var(--user);margin-left:auto}
.msg-assistant{background:var(--ai);margin-right:auto}
.msg-role{display:block;font-size:.7rem;color:var(--muted);text-transform:uppercase;margin-bottom:.25rem}
.msg-content p{margin:0}
.msg-content pre{background:#0d1117;padding:.75rem;border-radius:4px;overflow-x:auto;font-family:var(--mono);font-size:.875rem;margin:.5rem 0}
.msg-content code{font-family:var(--mono);font-size:.875rem}
.msg-content :not(pre)>code{background:rgba(110,118,129,.2);padding:.15rem .3rem;border-radius:3px}
.msg-ts{display:block;font-size:.65rem;color:var(--muted);margin-top:.25rem}
.typing{color:var(--muted);letter-spacing:.2em;font-size:.9rem;padding:.5rem 1rem}
.input-bar{display:flex;gap:.5rem;padding:.75rem 1rem;border-top:1px solid var(--border);background:var(--surface)}
.input-bar textarea{flex:1;resize:none;padding:.5rem;border-radius:6px;border:1px solid var(--border);font-family:var(--sans);font-size:1rem;background:var(--bg);color:var(--text)}
.input-bar textarea:focus{outline:none;border-color:var(--accent)}
.input-bar textarea:disabled{opacity:.5}
.send{padding:.5rem 1.25rem;border-radius:6px;border:none;background:var(--accent);color:#fff;cursor:pointer;font-weight:500;font-size:.9rem}
.send:hover{opacity:.9}.send:disabled{cursor:not-allowed;opacity:.4}
.error{background:rgba(248,81,73,.15);border:1px solid var(--error);border-radius:6px;padding:.5rem 1rem;display:flex;align-items:center;gap:.75rem;color:var(--error);font-size:.875rem}
.error button{background:var(--error);color:#fff;border:none;padding:.25rem .75rem;border-radius:4px;cursor:pointer}
/* Setup wizard */
.setup{max-width:500px;margin:auto;padding:2rem;text-align:center}
.setup h2{margin-bottom:1rem;color:var(--accent)}
.setup select,.setup input{width:100%;padding:.5rem;border-radius:6px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:.9rem;margin:.5rem 0}
.setup button{margin-top:1rem;padding:.5rem 1.5rem;border-radius:6px;border:none;background:var(--accent);color:#fff;cursor:pointer;font-weight:500;font-size:.9rem}
.setup .hint{font-size:.8rem;color:var(--muted);margin-top:.5rem}
@media(max-width:640px){.msg{max-width:95%}.header{padding:.5rem}.input-bar{padding:.5rem}}
</style>
</head>
<body>
<div class="page" id="app"></div>
<script type="module">
const API = "";
const $ = (t,p={},...c)=>{const e=document.createElement(t);Object.entries(p).forEach(([k,v])=>{if(k==="on")Object.entries(v).forEach(([ev,fn])=>e.addEventListener(ev,fn));else if(k==="class")e.className=v;else if(k==="html")e.innerHTML=v;else e.setAttribute(k,v)});c.flat().forEach(x=>{if(x==null)return;e.appendChild(typeof x==="string"?document.createTextNode(x):x)});return e};
function md(t){if(!t)return"";return t.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/```(\w*)\n([\s\S]*?)```/g,(_,l,c)=>`<pre><code>${c.trim()}</code></pre>`).replace(/`([^`]+)`/g,"<code>$1</code>").replace(/\*\*(.+?)\*\*/g,"<strong>$1</strong>").replace(/\*(.+?)\*/g,"<em>$1</em>").replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2" target="_blank" style="color:var(--accent)">$1</a>').replace(/\n/g,"<br>")}

let messages=[],conversationId=null,loading=false,error=null,backendType="",modelFile="",needsSetup=true;
const app=document.getElementById("app");

async function checkSetup(){
  try{
    const r=await fetch(`${API}/config/`);if(!r.ok){needsSetup=true;return}
    const c=await r.json();
    backendType=c.backend_type||"";modelFile=c.model_file||"";
    needsSetup=!modelFile;
  }catch{needsSetup=true}
}

async function render(){
  app.innerHTML="";
  if(needsSetup){renderSetup();return}

  // Header
  const h=$("div",{class:"header"},
    $("span",{class:"title"},"local-ai-runtime"),
    $("div",{class:"selects",id:"controls"}),
    $("div",{class:"status",id:"status"})
  );
  app.appendChild(h);

  // Status
  fetch(`${API}/status/`).then(r=>r.json()).then(s=>{
    const d=s.status==="ok"?"dot-ok":"dot-err";
    document.getElementById("status").innerHTML=`<span class="dot ${d}"></span> v${s.version||"?"}${s.model_loaded&&s.current_model?" · "+s.current_model:""}`;
  }).catch(()=>{document.getElementById("status").innerHTML=`<span class="dot dot-err"></span> unreachable`});

  // Model selector
  fetch(`${API}/models/`).then(r=>r.json()).then(d=>{
    const sel=$("select",{id:"modelsel",on:{change:e=>{modelFile=e.target.value;fetch(`${API}/config/`,{method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify({model_file:modelFile})})}}});
    (d.models||[]).forEach(m=>{const o=$("option",{value:m.filename},m.filename);if(m.filename===modelFile)o.selected=true;sel.appendChild(o)});
    document.getElementById("controls").appendChild(sel);
  }).catch(()=>{});

  // Backend selector
  fetch(`${API}/config/backends/`).then(r=>r.json()).then(d=>{
    const sel=$("select",{id:"backendsel",on:{change:e=>{
      const v=e.target.value;backendType=v;
      if(v!=="llama-cpp"){fetch(`${API}/config/`,{method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify({backend_type:v})})}
      document.getElementById("controls").appendChild(sel);
    }}});
    (d.backends||[]).forEach(b=>{const o=$("option",{value:b.name},`${b.name} ${b.type==="local"?"":""}${b.available?"":"(not installed)"}`);if(b.name===backendType)o.selected=true;sel.appendChild(o)});
    document.getElementById("controls").prepend(sel);
  }).catch(()=>{});

  // Chat
  const chat=$("div",{class:"chat",id:"chat"});
  if(!messages.length&&!loading){chat.appendChild($("div",{class:"chat-empty"},"Type a message to start."))}
  else{messages.forEach(m=>{
    const cls=m.role==="user"?"msg-user":"msg-assistant";
    const b=$("div",{class:`msg ${cls}`});
    b.appendChild($("span",{class:"msg-role"},m.role));
    const c=$("div",{class:"msg-content"});
    if(m.role==="assistant"){c.innerHTML=md(m.content)}else{c.appendChild($("p",{},m.content))}
    b.appendChild(c);if(m.ts)b.appendChild($("span",{class:"msg-ts"},m.ts));chat.appendChild(b)
  });if(loading)chat.appendChild($("div",{class:"typing"},"···"))}
  app.appendChild(chat);

  if(error){app.appendChild($("div",{class:"error"},$("span",{},error),$("button",{on:{click:retryLast}},"Retry")))}

  // Input
  const inp=$("textarea",{id:"input",placeholder:loading?"Waiting...":"Type a message...",rows:"1",on:{keydown:e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();send()}}}});
  if(loading)inp.disabled=true;
  const btn=$("button",{class:"send"},);if(loading)btn.disabled=true;btn.onclick=send;
  app.appendChild($("div",{class:"input-bar"},inp,btn));
  chat.scrollTop=chat.scrollHeight;
  if(!loading)inp.focus();
}

function renderSetup(){
  app.innerHTML="";
  const s=$("div",{class:"setup"},
    $("h2",{},">> local-ai-runtime"),
    $("p",{},"Select your inference provider:"),
  );

  const sel=$("select",{id:"setup-backend"});
  ["llama-cpp","ollama","openai","anthropic","gemini","openai_compatible","vllm"].forEach(b=>{
    sel.appendChild($("option",{value:b},b));
  });
  s.appendChild(sel);

  const modelInput=$("input",{id:"setup-model",placeholder:"Model file (GGUF) or model name (gpt-4o)",type:"text"});
  s.appendChild(modelInput);
  s.appendChild($("div",{class:"hint"},"llama-cpp: drop .gguf in models/ | ollama: model name | openai: gpt-4o"));

  const btn=$("button",{on:{click:async()=>{
    const b=document.getElementById("setup-backend").value;
    const m=document.getElementById("setup-model").value.trim();
    const body={backend_type:b};if(m)body.model_file=m;
    await fetch(`${API}/config/`,{method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)});
    needsSetup=false;backendType=b;modelFile=m;render();
  }}},">> Start");
  s.appendChild(btn);
  app.appendChild(s);
}

async function send(){
  const inp=document.getElementById("input");const text=inp?.value?.trim();
  if(!text||loading)return;
  messages.push({role:"user",content:text,ts:new Date().toLocaleTimeString()});
  loading=true;error=null;inp.value="";render();
  try{
    const res=await fetch(`${API}/chat/stream/`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({message:text,conversation_id:conversationId})});
    if(!res.ok){const err=await res.json().catch(()=>({detail:"Request failed"}));throw new Error(err.detail||`HTTP ${res.status}`)}
    const reader=res.body.getReader(),dec=new TextDecoder();let full="";
    messages.push({role:"assistant",content:"",ts:""});
    while(true){const{done,value}=await reader.read();if(done)break;for(const line of dec.decode(value,{stream:true}).split("\n")){
      if(!line.startsWith("data: "))continue;try{const d=JSON.parse(line.slice(6));if(d.done)break;if(d.token){full+=d.token;messages[messages.length-1].content=full;render()}if(d.error){error=d.error;break}}catch{}}}
  }catch(e){error=e.message;messages=messages.filter(m=>!(m.role==="assistant"&&!m.content))}
  finally{loading=false;render()}
}

function retryLast(){
  const last=[...messages].reverse().find(m=>m.role==="user");
  if(last){messages=messages.filter(m=>m!==last);const t=last.content;messages.push({role:"user",content:t,ts:new Date().toLocaleTimeString()});loading=true;error=null;render();
  fetch(`${API}/chat/stream/`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({message:t,conversation_id:conversationId})}).then(async res=>{
    const r=res.body.getReader(),d=new TextDecoder();let f="";messages.push({role:"assistant",content:"",ts:""});
    while(true){const{done,value}=await r.read();if(done)break;for(const line of d.decode(value,{stream:true}).split("\n")){if(!line.startsWith("data: "))continue;try{const x=JSON.parse(line.slice(6));if(x.token){f+=x.token;messages[messages.length-1].content=f;render()}if(x.error){error=x.error;break}}catch{}}}
  }).catch(e=>{error=e.message}).finally(()=>{loading=false;render()})}
}

fetch(`${API}/conversations/`,{method:"POST",headers:{"Content-Type":"application/json"},body:"{}"}).then(r=>r.json()).then(c=>conversationId=c.id).catch(()=>{});
checkSetup().then(()=>render());
</script>
</body>
</html>
